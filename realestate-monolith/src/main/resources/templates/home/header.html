<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/2.11.8/umd/popper.min.js" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" crossorigin="anonymous" />
    <!-- Added Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        /* Adding z-index to ensure dropdown appears on top */
        .dropdown-menu {
            z-index: 1030;
        }
    </style>
</head>
<body>
<th:block th:fragment="header">
    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/home/home}">
                <img th:src="@{/access/image/herta.png}" alt="Logo" class="rounded-circle" width="50" height="50">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link fw-bold" th:href="@{/sale/all-sale}">Nhà đất bán</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-bold" th:href="@{/rental/all-rental}">Nhà đất cho thuê</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-bold" href="https://batdongsan.com.vn/nha-dat-ban-tp-hcm">Tin tức</a>
                    </li>
                </ul>

                <div class="dropdown">
                    <button class="btn btn-light dropdown-toggle" type="button" id="dropdownMenuButton" data-bs-toggle="dropdown" aria-expanded="false">
                        <img class="rounded-circle border" width="40" height="40" style="object-fit: cover;"
                             th:src="${session.image != null} ? ${session.image} : 'https://cdn-icons-png.flaticon.com/512/149/149071.png'" alt="Avatar">
                        <span th:text="${session.USERNAME}"></span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="dropdownMenuButton">
                        <li><a class="dropdown-item" th:href="@{/home/home}"><i class="bi bi-house"></i> Trang chủ</a></li>
                        <li><a class="dropdown-item" th:href="@{/user/user-info}"><i class="fa-regular fa-address-card"></i> Thông tin cá nhân</a></li>
                        <li><a class="dropdown-item" th:href="@{/user/listing-manager}"><i class="bi bi-layout-text-sidebar-reverse"></i> Quản lý bài đăng</a></li>
                        <li><a class="dropdown-item" th:href="@{/user/changePassword}"><i class="bi bi-file-lock"></i> Đổi mật khẩu</a></li>
                        <li><a class="dropdown-item" th:href="@{/payment/deposit}"><i class="bi bi-window-plus"></i> Nạp tiền</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" th:href="@{/user/logout}"><i class="fa-solid fa-arrow-right-from-bracket" style="transform: rotate(180deg);"></i> Đăng xuất</a></li>
                    </ul>
                </div>
                <a th:href="@{/listing/post-address}" class="btn btn-outline-secondary rounded-pill ms-3">Đăng tin</a>
            </div>
        </div>
    </nav>
</th:block>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Explicitly initialize Bootstrap dropdowns
    document.addEventListener('DOMContentLoaded', function() {
        var dropdownElementList = [].slice.call(document.querySelectorAll('.dropdown-toggle'));
        var dropdownList = dropdownElementList.map(function(dropdownToggleEl) {
            return new bootstrap.Dropdown(dropdownToggleEl);
        });
    });
</script>
</body>
</html>
