<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/2.11.8/umd/popper.min.js" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" crossorigin="anonymous" />
    <style>
        .btn-post {
            background-color: #3f99cd; /* Mặc định là xanh lá */
            color: white;
            transition: background-color 0.3s ease;
        }

        .btn-post:hover,
        .btn-post:active {
            background-color: #0d6efd; /* Chuyển sang xanh dương */
            color: white;
        }
    </style>
</head>
<body>
<th:block th:fragment="header-off">
    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/home/home}">
                <img th:src="@{/access/image/herta.png}" alt="Logo" class="rounded-circle" width="50" height="50">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link fw-bold" th:href="@{/sale/all-sale}">Nhà đất bán</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-bold" th:href="@{/rental/all-rental}">Nhà đất cho thuê</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-bold" href="https://batdongsan.com.vn/nha-dat-ban-tp-hcm">Tin tức</a>
                    </li>
                </ul>

                <div class="d-flex gap-2">
                    <a th:href="@{/home/login-page}" class="btn btn-outline-dark rounded">
                        <i class="fas fa-sign-in-alt me-1"></i> Đăng nhập
                    </a>
                    <a th:href="@{/user/register}" class="btn btn-outline-dark rounded">
                        <i class="fas fa-user-plus me-1"></i> Đăng ký
                    </a>
                    <a th:href="@{/listing/post-address}" class="btn btn-post rounded">
                        <i class="fas fa-plus-circle me-1"></i> Đăng tin
                    </a>
                </div>
            </div>
        </div>
    </nav>
</th:block>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
