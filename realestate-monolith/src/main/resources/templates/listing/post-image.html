<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Tạo bài đăng - Hình ảnh</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet"/>
    <style>
        :root {
            --bs-primary: #007bff;
            --bs-body-bg: #fff;
        }
        body { background-color: var(--bs-body-bg); color: #212529; }
        .card { border-radius: 1rem; box-shadow: 0 .5rem 1rem rgba(0,0,0,0.1); }
        .step-indicator { font-size: 1.1rem; color: var(--bs-primary); }
        .step-indicator span { font-weight: 500; }
        .upload-area {
            border: 2px dashed var(--bs-primary);
            border-radius: .75rem;
            padding: 2rem;
            text-align: center;
            background-color: #f8f9fa;
            transition: background .3s;
        }
        .upload-area.dragover { background-color: #e9f5ff; }
        .upload-btn {
            background-color: var(--bs-primary);
            color: #fff;
            border-radius: 2rem;
            padding: .5rem 1.5rem;
            border: none;
        }
        .uploaded-images { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 1rem; margin-top: 1rem; }
        .image-item { position: relative; width: 100%; padding-top: 100%; /* 1:1 aspect */ background: #f3f3f3; border-radius: .75rem; overflow: hidden; }
        .image-item img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .btn-primary { background-color: var(--bs-primary); border: none; border-radius: 2rem; padding: .6rem 1.5rem; }
        .btn-primary:hover { background-color: #0069d9; }
    </style>
</head>
<body>
<th:block th:insert="~{ home/header :: header}"></th:block>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">
            <div class="card p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="step-indicator"><span>Bước 3:</span> Hình ảnh</div>
                    <a th:href="@{/home/home}" class="btn btn-outline-secondary">Thoát</a>
                </div>
                <hr>
                <form class="needs-validation" th:action="@{/listing/complete}" method="post" enctype="multipart/form-data" novalidate>
                    <div class="mb-4">
                        <h2 class="h5 text-primary">Tải lên hình ảnh</h2>
                        <p>Tối thiểu 3 ảnh, tối đa 10 ảnh.</p>
                        <div class="upload-area" id="uploadArea">
                            <p><i class="fas fa-cloud-upload-alt fa-2x"></i></p>
                            <p>Kéo thả ảnh vào đây hoặc</p>
                            <button type="button" class="upload-btn" id="uploadBtn">Chọn ảnh từ thiết bị</button>
                            <input type="file" id="fileInput" name="images" multiple accept="image/*" style="display:none;" required>
                            <div class="invalid-feedback">Vui lòng tải lên ít nhất 3 ảnh.</div>
                        </div>
                        <div class="uploaded-images" id="uploadedImages"></div>
                    </div>
                    <div class="d-flex justify-content-end">
                        <button type="submit" class="btn btn-primary">Hoàn tất bài đăng</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    // Bootstrap validation
    (function(){ 'use strict'; var forms = document.querySelectorAll('.needs-validation'); Array.prototype.slice.call(forms).forEach(function(form){ form.addEventListener('submit', function(event){ if(!form.checkValidity()){ event.preventDefault(); event.stopPropagation(); } form.classList.add('was-validated'); }, false); }); })();
    const uploadBtn = document.getElementById('uploadBtn');
    const fileInput = document.getElementById('fileInput');
    const uploadArea = document.getElementById('uploadArea');
    const uploadedImages = document.getElementById('uploadedImages');
    uploadBtn.addEventListener('click', ()=> fileInput.click());
    uploadArea.addEventListener('dragover', e=>{ e.preventDefault(); uploadArea.classList.add('dragover'); });
    uploadArea.addEventListener('dragleave', ()=>uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', e=>{ e.preventDefault(); uploadArea.classList.remove('dragover'); fileInput.files = e.dataTransfer.files; fileInput.dispatchEvent(new Event('change')); });
    fileInput.addEventListener('change', event=>{
        uploadedImages.innerHTML = '';
        const files = Array.from(event.target.files).slice(0,10);
        files.forEach(file=>{
            const reader = new FileReader();
            reader.onload = e=>{
                const div = document.createElement('div'); div.className='image-item'; div.innerHTML=`<img src="${e.target.result}" alt="Ảnh">`;
                uploadedImages.appendChild(div);
            };
            reader.readAsDataURL(file);
        });
    });
</script>
</body>
</html>
