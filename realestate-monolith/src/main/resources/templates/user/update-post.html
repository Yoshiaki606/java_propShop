<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Real Estate Post Update Form">
    <meta name="author" content="">
    <title>Cập nhật thông tin bài đăng</title>

    <!-- Bootstrap and dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/2.11.8/umd/popper.min.js"
            integrity="sha512-TPh2Oxlg1zp+kz3nFA0C5vVC6leG/6mm1z9+mA81MI5eaUVqasPLO8Cuk4gMF4gUfP5etR73rgU/8PNMsSesoQ=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
          integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
          crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Custom CSS -->
    <style>
        :root {
            --primary-color: #0d6efd;
            --primary-light: #e7f0ff;
            --primary-dark: #0a58ca;
            --white: #ffffff;
            --light-gray: #f8f9fa;
            --dark-gray: #6c757d;
        }

        body {
            background-color: #f5f5f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #212529;
        }

        .main-container {
            padding-top: 80px;
        }

        .card {
            border: none;
            border-radius: 0.5rem;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
            margin-bottom: 1.5rem;
            background-color: var(--white);
        }

        .card-header {
            background-color: var(--primary-color);
            color: var(--white);
            border-radius: 0.5rem 0.5rem 0 0 !important;
            font-weight: 600;
            padding: 1rem;
        }

        .card-body {
            padding: 1.5rem;
        }

        .form-label {
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #495057;
        }

        .form-control, .btn-outline-secondary {
            border-radius: 0.375rem;
            padding: 0.5rem 0.75rem;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }

        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            padding: 0.5rem 1.5rem;
            font-weight: 500;
        }

        .btn-primary:hover {
            background-color: var(--primary-dark);
            border-color: var(--primary-dark);
        }

        .option-type {
            border: 1px solid #ced4da;
            border-radius: 2rem;
            padding: 0.75rem 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
        }

        .option-type.selected {
            background-color: var(--primary-light);
            border-color: var(--primary-color);
        }

        .option-type:hover {
            background-color: var(--light-gray);
        }

        .option-type i {
            color: var(--primary-color);
            margin-right: 0.5rem;
        }

        .upload-area {
            border: 2px dashed #ced4da;
            border-radius: 0.5rem;
            padding: 2rem;
            text-align: center;
            margin: 1rem 0;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            border-color: var(--primary-color);
            background-color: var(--primary-light);
        }

        .upload-btn {
            background-color: var(--primary-color);
            color: var(--white);
            border: none;
            border-radius: 0.375rem;
            padding: 0.5rem 1rem;
            margin-top: 1rem;
            cursor: pointer;
        }

        .upload-btn:hover {
            background-color: var(--primary-dark);
        }

        .uploaded-images {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin: 1rem 0;
        }

        .image-item {
            position: relative;
            width: 150px;
            height: 150px;
            border-radius: 0.375rem;
            overflow: hidden;
        }

        .image-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .edit-btn {
            position: absolute;
            bottom: 5px;
            left: 5px;
            background-color: rgba(0, 0, 0, 0.6);
            color: var(--white);
            border: none;
            border-radius: 0.25rem;
            padding: 0.25rem 0.5rem;
            font-size: 0.75rem;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--primary-color);
            border-bottom: 1px solid #e9ecef;
            padding-bottom: 0.75rem;
        }

        .location-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        @media (max-width: 992px) {
            .location-group > div {
                flex: 1 1 30%;
            }
        }

        @media (max-width: 768px) {
            .location-group {
                flex-direction: column;
            }

            .location-group > div {
                width: 100%;
            }

            .option-type {
                margin-bottom: 0.5rem;
            }
        }

        .description {
            min-height: 120px;
        }

        .dropdown-select {
            width: 100%;
            background-color: var(--white);
            border: 1px solid #ced4da;
            color: #212529;
            text-align: left;
            position: relative;
        }

        .dropdown-select:focus,
        .dropdown-select:active {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }

        footer {
            background-color: #343a40;
            color: var(--white);
            padding: 1.5rem 0;
            margin-top: 2rem;
        }
    </style>
</head>

<body>
<!-- Header will be inserted here by Thymeleaf -->
<th:block th:insert="~{ home/header :: header}"></th:block>

<div class="container main-container">
    <div class="row">
        <div class="col-lg-10 col-md-12 mx-auto">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Chỉnh sửa bài đăng</h4>
                </div>
                <div class="card-body">
                    <form th:object="${property}" action="#" th:action="@{/user/update-post}" method="POST"
                          enctype="multipart/form-data">
                        <input type="hidden" th:value="${property.propertyId}" name="propertyId">

                        <!-- Transaction Type -->
                        <div class="card mb-4">
                            <div class="card-body">
                                <h5 class="section-title">Nhu cầu</h5>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <div class="option-type" id="sellOption">
                                            <input th:field="*{propertyTypeTransaction}" type="radio" value="sell" id="sell"
                                                   name="option" class="me-2">
                                            <i class="fa-solid fa-tag me-2 text-primary"></i>
                                            <label for="sell" class="mb-0">Bán</label>
                                        </div>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <div class="option-type" id="rentOption">
                                            <input th:field="*{propertyTypeTransaction}" type="radio" value="rent" id="rent"
                                                   name="option" class="me-2">
                                            <i class="fa-solid fa-key me-2 text-primary"></i>
                                            <label for="rent" class="mb-0">Cho thuê</label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Property Address -->
                        <div class="card mb-4">
                            <div class="card-body">
                                <h5 class="section-title">Địa chỉ bất động sản</h5>
                                <div class="location-group mb-3">
                                    <div class="mb-2">
                                        <select th:field="*{address.province}" class="form-select dropdown-select" name="city" id="city">
                                            <option value="">Tỉnh/Thành phố</option>
                                        </select>
                                    </div>
                                    <div class="mb-2">
                                        <select class="form-select dropdown-select" name="district" id="district">
                                            <option value="">Quận/Huyện</option>
                                        </select>
                                    </div>
                                    <div class="mb-2">
                                        <select class="form-select dropdown-select" name="ward" id="ward">
                                            <option value="">Phường/Xã</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="location" class="form-label">Địa chỉ cụ thể</label>
                                    <input type="text" value="" id="location" name="location"
                                           class="form-control" placeholder="Địa chỉ cụ thể">
                                </div>

                                <div class="mb-3">
                                    <label for="displayAddress" class="form-label">Địa chỉ hiển thị trên tin</label>
                                    <input
                                            th:value="${property.address.street}+', '+${property.address.ward}+', '+ ${property.address.district}+', '+${property.address.province}"
                                            type="text" id="displayAddress" class="form-control"
                                            placeholder="Địa chỉ hiển thị" readonly>
                                </div>
                            </div>
                        </div>

                        <!-- Title and Description -->
                        <div class="card mb-4">
                            <div class="card-body">
                                <h5 class="section-title">Tiêu đề và Mô tả</h5>
                                <div class="mb-3">
                                    <label for="title" class="form-label">Tiêu đề</label>
                                    <textarea th:field="*{propertyTitle}" name="title" id="title" class="form-control"
                                              placeholder="Mô tả ngắn gọn về loại hình bất động sản, diện tích, địa chỉ" rows="2"></textarea>
                                </div>

                                <div class="mb-3">
                                    <label for="description" class="form-label">Mô tả</label>
                                    <textarea th:field="*{propertyDescription}" name="description" id="description"
                                              class="form-control description"
                                              placeholder="Mô tả chi tiết về: loại hình bất động sản, vị trí, diện tích, tiện ích, tình trạng nội thất, ..." rows="5"></textarea>
                                </div>
                            </div>
                        </div>

                        <!-- Main Information -->
                        <div class="card mb-4">
                            <div class="card-body">
                                <h5 class="section-title">Thông tin chính</h5>
                                <div class="mb-3">
                                    <label for="type" class="form-label">Loại BĐS</label>
                                    <select class="form-select dropdown-select" name="property-type" id="type">
                                        <option th:text="*{propertyType}">-- Chọn loại BĐS --</option>
                                        <option value="Căn hộ">Căn hộ chung cư</option>
                                        <option value="Nhà riêng">Nhà riêng</option>
                                        <option value="Biệt thự">Nhà biệt thự</option>
                                        <option value="Nhà mặt phố">Nhà mặt phố</option>
                                        <option value="Nhà trọ">Nhà trọ/Phòng trọ</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="square-meters" class="form-label">Diện tích</label>
                                    <div class="input-group">
                                        <input th:field="*{squareMeters}" name="square-meters" id="square-meters" type="number"
                                               class="form-control" placeholder="Nhập diện tích">
                                        <span class="input-group-text">m²</span>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="price" class="form-label">Mức giá</label>
                                    <div class="input-group">
                                        <input th:field="*{propertyPrice}" name="price" id="price" type="number" class="form-control"
                                               placeholder="Nhập giá">
                                        <span class="input-group-text">VNĐ</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Additional Information -->
                        <div class="card mb-4">
                            <div class="card-body">
                                <h5 class="section-title">Thông tin khác</h5>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="paper" class="form-label">Giấy tờ pháp lý</label>
                                        <select class="form-select dropdown-select" name="paper" id="paper">
                                            <option th:text="*{propertyLegal}">-- Chọn giấy tờ pháp lý --</option>
                                            <option value="Sổ đỏ/Sổ hồng">Sổ đỏ/Sổ hồng</option>
                                            <option value="Hợp đồng mua bán">Hợp đồng mua bán</option>
                                            <option value="Đang chờ sổ">Đang chờ sổ</option>
                                            <option value="Khác">Khác</option>
                                        </select>
                                    </div>

                                    <div class="col-md-6 mb-3">
                                        <label for="house" class="form-label">Nội thất</label>
                                        <select class="form-select dropdown-select" name="interior" id="house">
                                            <option th:text="*{propertyInterior}">-- Chọn nội thất --</option>
                                            <option value="Đầy đủ">Đầy đủ</option>
                                            <option value="Cơ bản">Cơ bản</option>
                                            <option value="Không">Không có nội thất</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-4 mb-3">
                                        <label for="floors" class="form-label">Số tầng</label>
                                        <input th:field="*{propertyFloor}" name="floors" id="floors" type="number" class="form-control"
                                               placeholder="Nhập số tầng">
                                    </div>

                                    <div class="col-md-4 mb-3">
                                        <label for="bedroom" class="form-label">Số phòng ngủ</label>
                                        <input th:field="*{bedrooms}" name="bedroom" id="bedroom" type="number" class="form-control"
                                               placeholder="Nhập số phòng ngủ">
                                    </div>

                                    <div class="col-md-4 mb-3">
                                        <label for="bathroom" class="form-label">Số phòng tắm/vệ sinh</label>
                                        <input th:field="*{bathrooms}" name="bathroom" id="bathroom" type="number" class="form-control"
                                               placeholder="Nhập số phòng tắm/vệ sinh">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Images -->
                        <div class="card mb-4">
                            <div class="card-body">
                                <h5 class="section-title">Hình ảnh</h5>
                                <p class="text-muted mb-3">
                                    <i class="fa-solid fa-circle-info me-1 text-primary"></i>
                                    Đăng tối thiểu 3 hình ảnh, tối đa 10 với tất cả các loại tin
                                </p>

                                <!-- Image Preview Area -->
                                <div class="uploaded-images" id="uploadedImages">
                                    <div th:each="image:*{listImages}" class="image-item">
                                        <img th:src="${image.imageUrl}" alt="Property Image">
                                    </div>
                                </div>

                                <!-- Upload Area -->
                                <div class="upload-area" id="uploadArea">
                                    <i class="fa-solid fa-cloud-arrow-up fs-2 text-primary mb-3"></i>
                                    <p>Kéo thả ảnh vào đây <br> hoặc</p>
                                    <button type="button" class="btn btn-primary" id="uploadBtn">
                                        <i class="fa-solid fa-upload me-1"></i>
                                        Thêm ảnh từ thiết bị
                                    </button>
                                    <input type="file" id="fileInput" name="images" class="form-control" multiple
                                           style="display:none;">
                                </div>
                            </div>
                        </div>

                        <!-- Contact Information -->
                        <div class="card mb-4">
                            <div class="card-body">
                                <h5 class="section-title">Thông tin liên hệ</h5>
                                <div class="row">
                                    <div class="col-md-4 mb-3">
                                        <label for="contact-user" class="form-label">Họ và tên</label>
                                        <input th:field="*{postInformation.fullName}" type="text" name="contact-user" id="contact-user"
                                               class="form-control" placeholder="Nhập họ và tên">
                                    </div>

                                    <div class="col-md-4 mb-3">
                                        <label for="contact-email" class="form-label">Email</label>
                                        <input th:field="*{postInformation.email}" type="email" class="form-control"
                                               name="contact-email" id="contact-email" placeholder="Nhập email">
                                    </div>

                                    <div class="col-md-4 mb-3">
                                        <label for="contact-phone" class="form-label">Số điện thoại</label>
                                        <input th:field="*{postInformation.phone}" type="text" name="contact-phone" id="contact-phone"
                                               class="form-control" placeholder="Nhập số điện thoại">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Submit Button -->
                        <div class="text-end">
                            <button type="submit" value="Submit" class="btn btn-primary">
                                <i class="fa-solid fa-check me-1"></i>
                                Hoàn tất thay đổi
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.2.3/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/0.21.1/axios.min.js"></script>

<!-- Province API Script -->
<script th:src="@{/access/js/apiprovince.js}"></script>

<!-- Radio Button Selection Script -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const sellOption = document.getElementById('sellOption');
        const rentOption = document.getElementById('rentOption');
        const sellRadio = document.getElementById('sell');
        const rentRadio = document.getElementById('rent');

        // Check initial state
        if (sellRadio.checked) {
            sellOption.classList.add('selected');
        } else if (rentRadio.checked) {
            rentOption.classList.add('selected');
        }

        // Add click handlers
        sellOption.addEventListener('click', function() {
            sellRadio.checked = true;
            sellOption.classList.add('selected');
            rentOption.classList.remove('selected');
        });

        rentOption.addEventListener('click', function() {
            rentRadio.checked = true;
            rentOption.classList.add('selected');
            sellOption.classList.remove('selected');
        });
    });
</script>

<!-- Image Upload Script -->
<script>
    const uploadBtn = document.getElementById('uploadBtn');
    const fileInput = document.getElementById('fileInput');
    const uploadedImages = document.getElementById('uploadedImages');
    const uploadArea = document.getElementById('uploadArea');

    // Click button to add images
    uploadBtn.addEventListener('click', () => fileInput.click());

    // Handle file selection
    fileInput.addEventListener('change', (event) => {
        const files = event.target.files;
        if (files.length > 0) {
            Array.from(files).forEach(file => {
                if (file.type.match('image.*')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const imageContainer = document.createElement('div');
                        imageContainer.classList.add('image-item');

                        const img = document.createElement('img');
                        img.src = e.target.result;
                        img.alt = "Property Image";

                        imageContainer.appendChild(img);
                        uploadedImages.appendChild(imageContainer);
                    };
                    reader.readAsDataURL(file);
                }
            });
        }
    });

    // Handle drag and drop
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        uploadArea.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
        uploadArea.addEventListener(eventName, highlight, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        uploadArea.addEventListener(eventName, unhighlight, false);
    });

    function highlight() {
        uploadArea.classList.add('bg-light');
    }

    function unhighlight() {
        uploadArea.classList.remove('bg-light');
    }

    uploadArea.addEventListener('drop', handleDrop, false);

    function handleDrop(e) {
        const dt = e.dataTransfer;
        const files = dt.files;

        if (files.length > 0) {
            [...files].forEach(file => {
                if (file.type.match('image.*')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const imageContainer = document.createElement('div');
                        imageContainer.classList.add('image-item');

                        const img = document.createElement('img');
                        img.src = e.target.result;
                        img.alt = "Property Image";

                        imageContainer.appendChild(img);
                        uploadedImages.appendChild(imageContainer);
                    };
                    reader.readAsDataURL(file);
                }
            });
        }
    }
</script>

<!-- Copy Text Script -->
<script th:src="@{/access/js/copyText.js}"></script>
</body>
</html>
