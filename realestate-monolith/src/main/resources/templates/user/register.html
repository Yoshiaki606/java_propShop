<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registration form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/access/css/home.css}">
    <style>
        :root {
            --primary-blue: #1e88e5;
            --secondary-blue: #0d47a1;
            --light-blue: #e3f2fd;
            --white: #ffffff;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-blue));
            min-height: 100vh;
        }

        .card {
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            border: none;
        }

        .form-control {
            padding: 0.75rem 1.2rem;
            border: 1px solid #e1e1e1;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 0.2rem rgba(30, 136, 229, 0.25);
        }

        .btn-register {
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-blue));
            color: white !important;
            border: none;
            padding: 0.7rem 2rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            opacity: 0.9;
        }

        .card-heading {
            color: var(--secondary-blue);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .error {
            color: #d32f2f;
            font-size: 0.8rem;
            margin-top: 0.25rem;
        }

        .policy {
            font-size: 0.8rem;
            color: #6c757d;
        }

        .form-label {
            font-weight: 600;
            color: #424242;
        }

        .alert {
            border-radius: 10px;
        }

        .bg-image-container {
            background-image: url('https://images.unsplash.com/photo-1580587771525-78b9dba3b914?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1074&q=80');
            background-size: cover;
            background-position: center;
            border-radius: 20px 0 0 20px;
        }

        @media (max-width: 992px) {
            .bg-image-container {
                display: none;
            }

            .card {
                max-width: 100% !important;
                margin: 2rem !important;
            }
        }

        @media (max-width: 576px) {
            .card {
                margin: 1rem !important;
                padding: 1.5rem !important;
            }
        }
    </style>
</head>

<body>
<div class="container-fluid py-5">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-lg-10">
            <div class="card overflow-hidden">
                <div class="row g-0">
                    <div class="col-lg-6 bg-image-container d-none d-lg-block"></div>
                    <div class="col-lg-6">
                        <div class="card-body p-5">
                            <div class="text-center mb-4">
                                <h2 class="card-heading text-uppercase">Create an Account</h2>
                                <p class="text-muted">Join us today and enjoy our services</p>
                            </div>

                            <div th:if="${success}" class="alert alert-success mb-4" role="alert">
                                <i class="fas fa-check-circle me-2"></i> <span th:text="${success}"></span>
                            </div>

                            <div th:if="${error}" class="alert alert-warning mb-4" role="alert">
                                <i class="fas fa-exclamation-triangle me-2"></i> <span th:text="${error}"></span>
                            </div>

                            <form th:action="@{/user/register}" method="post" th:object="${user}" class="needs-validation" novalidate>
                                <div class="mb-3">
                                    <label class="form-label" for="form3Example1cg">Your Full Name</label>
                                    <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0">
                                                <i class="fas fa-user text-muted"></i>
                                            </span>
                                        <input th:field="*{fullName}" type="text" id="form3Example1cg"
                                               class="form-control border-start-0 rounded-end" placeholder="Enter your full name" />
                                    </div>
                                    <span th:text="${errorFullName}" id="errorFullNameSpan" class="error"></span>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label" for="form3Example3cg">Your Email</label>
                                    <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0">
                                                <i class="fas fa-envelope text-muted"></i>
                                            </span>
                                        <input th:field="*{email}" type="email" id="form3Example3cg"
                                               class="form-control border-start-0 rounded-end" placeholder="Enter your email" />
                                    </div>
                                    <span th:text="${errorEmail}" class="error"></span>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label" for="form3Example4cdg2">Phone</label>
                                    <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0">
                                                <i class="fas fa-phone text-muted"></i>
                                            </span>
                                        <input th:field="*{phone}" type="tel" id="form3Example4cdg2"
                                               class="form-control border-start-0 rounded-end" placeholder="Enter your phone number" />
                                    </div>
                                    <span th:text="${errorPhone}" class="error"></span>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label" for="form3Example4cg">Password</label>
                                    <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0">
                                                <i class="fas fa-lock text-muted"></i>
                                            </span>
                                        <input th:field="*{password}" type="password" id="form3Example4cg"
                                               class="form-control border-start-0 rounded-end" placeholder="Create a password" />
                                    </div>
                                    <span th:text="${errorPassword}" class="error"></span>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label" for="form3Example4cdg">Repeat your password</label>
                                    <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0">
                                                <i class="fas fa-lock text-muted"></i>
                                            </span>
                                        <input th:field="*{confirmPassword}" type="password" id="form3Example4cdg"
                                               class="form-control border-start-0 rounded-end" placeholder="Confirm your password" />
                                    </div>
                                    <span th:text="${errorPassword}" class="error"></span>
                                </div>

                                <div class="mb-4">
                                    <p class="policy text-center">
                                        By continuing, you agree to our
                                        <span class="text-primary fw-bold">Terms of Use, Privacy Policy, Rules, Policies.</span>
                                    </p>
                                </div>

                                <div class="d-grid mb-4">
                                    <button type="submit" value="Submit" class="btn btn-register rounded-pill">
                                        <i class="fas fa-user-plus me-2"></i> Register
                                    </button>
                                </div>

                                <div class="text-center">
                                    <p class="mb-0">Have already an account?
                                        <a th:href="@{/user/login}" class="fw-bold text-primary text-decoration-none">
                                            Login here
                                        </a>
                                    </p>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:insert="~{ home/footer :: footer}"></th:block>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
<script>
    // Wait for the document to be fully loaded
    document.addEventListener("DOMContentLoaded", function() {
        // Select the span element by its ID
        var errorSpan = document.getElementById("errorFullNameSpan");

        // Log the text content of the span to the console
        console.log("Error message:", errorSpan.textContent);
    });
</script>
</body>

</html>
