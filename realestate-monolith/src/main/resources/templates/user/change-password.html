<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Change Password Page">
    <meta name="author" content="">

    <title>Change Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-blue: #1e88e5;
            --secondary-blue: #0d47a1;
            --light-blue: #e3f2fd;
            --white: #ffffff;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-blue));
            min-height: 100vh;
        }

        .card {
            border-radius: 20px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            border: none;
        }

        .bg-image {
            background-image: url('https://c7.alamy.com/comp/EJ9KGJ/change-your-password-EJ9KGJ.jpg');
            background-size: cover;
            background-position: center;
            min-height: 100%;
            border-radius: 20px 0 0 20px;
        }

        .form-control {
            padding: 0.75rem 1.2rem;
            border: 1px solid #e1e1e1;
            transition: all 0.3s;
            border-radius: 30px;
        }

        .form-control:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 0.2rem rgba(30, 136, 229, 0.25);
        }

        .btn-primary {
            background-color: var(--primary-blue);
            border: none;
            padding: 0.7rem 2rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background-color: var(--secondary-blue);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .btn-danger {
            padding: 0.7rem 2rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .card-header {
            background-color: var(--light-blue);
            padding: 1.5rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .text-primary {
            color: var(--primary-blue) !important;
        }

        .form-label {
            font-weight: 600;
            margin-left: 0.5rem;
            margin-bottom: 0.3rem;
        }

        .alert {
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 992px) {
            .bg-image {
                display: none;
            }
        }

        @media (max-width: 576px) {
            .container {
                padding: 0 1rem;
            }

            .card {
                margin: 1rem;
            }

            .form-control, .btn {
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>
<th:block th:insert="~{ home/header :: header}"></th:block>

<div class="container" style="padding-top: 100px; min-height: 600px;">
    <div class="row justify-content-center align-items-center">
        <div class="col-xl-10 col-lg-12 col-md-9">
            <div class="card o-hidden border-0 shadow-lg my-5">
                <div class="card-body p-0">
                    <div class="row" style="min-height: 450px; border-radius: 15px; background-image: url('https://img.freepik.com/free-vector/grey-geometric-background-design_1055-3183.jpg');">
                        <div class="col-lg-6 d-none d-lg-block bg-image"></div>
                        <div class="col-lg-6">
                            <div class="p-5">
                                <div class="text-center mb-4">
                                    <h2 class="text-white fw-bold mb-3">Change Your Password</h2>
                                </div>

                                <div th:if="${success}" class="alert alert-success d-flex align-items-center" role="alert">
                                    <i class="fas fa-check-circle me-2"></i>
                                    <div th:text="${success}"></div>
                                </div>

                                <div th:if="${error}" class="alert alert-danger d-flex align-items-center" role="alert">
                                    <i class="fas fa-exclamation-circle me-2"></i>
                                    <div th:text="${error}"></div>
                                </div>

                                <form th:action="@{/user/changePassword}" class="user" method="post">
                                    <div class="mb-3">
                                        <label for="currentPassword" class="form-label text-white mx-3">
                                            <strong>Mật khẩu hiện tại</strong>
                                        </label>
                                        <div class="input-group">
                                                <span class="input-group-text bg-light border-end-0 rounded-start-pill">
                                                    <i class="fas fa-lock text-muted"></i>
                                                </span>
                                            <input type="password" name="password"
                                                   class="form-control border-start-0 rounded-end-pill"
                                                   id="currentPassword"
                                                   placeholder="Nhập mật khẩu hiện tại">
                                        </div>
                                    </div>

                                    <div class="mb-3">
                                        <label for="exampleInputEmail" class="form-label text-white mx-3">
                                            <strong>Mật khẩu mới</strong>
                                        </label>
                                        <div class="input-group">
                                                <span class="input-group-text bg-light border-end-0 rounded-start-pill">
                                                    <i class="fas fa-key text-muted"></i>
                                                </span>
                                            <input type="password" name="password"
                                                   class="form-control border-start-0 rounded-end-pill"
                                                   id="exampleInputEmail"
                                                   placeholder="Nhập mật khẩu mới">
                                        </div>
                                    </div>

                                    <div class="mb-4">
                                        <label for="newPassword" class="form-label text-white mx-3">
                                            <strong>Nhập lại mật khẩu mới</strong>
                                        </label>
                                        <div class="input-group">
                                                <span class="input-group-text bg-light border-end-0 rounded-start-pill">
                                                    <i class="fas fa-key text-muted"></i>
                                                </span>
                                            <input type="password" name="confirmPassword"
                                                   class="form-control border-start-0 rounded-end-pill"
                                                   id="newPassword"
                                                   placeholder="Nhập lại mật khẩu mới">
                                        </div>
                                    </div>

                                    <hr class="my-4">

                                    <div class="d-grid gap-2">
                                        <button type="submit" class="btn btn-primary rounded-pill">
                                            <i class="fas fa-save me-2"></i> Lưu thay đổi
                                        </button>
                                        <a th:href="@{/user/cancelChange}" class="btn btn-danger rounded-pill">
                                            <i class="fas fa-times me-2"></i> Hủy thay đổi
                                        </a>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:insert="~{ home/footer :: footer}"></th:block>

<!-- Bootstrap core JavaScript -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>

<!-- Form validation script -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.querySelector('form');
        const currentPassword = document.getElementById('currentPassword');
        const newPassword = document.getElementById('exampleInputEmail');
        const confirmPassword = document.getElementById('newPassword');

        form.addEventListener('submit', function(event) {
            // Clear previous error messages
            clearErrors();

            let valid = true;

            // Validate current password
            if (!currentPassword.value.trim()) {
                showError(currentPassword, 'Vui lòng nhập mật khẩu hiện tại');
                valid = false;
            }

            // Validate new password
            if (!newPassword.value.trim()) {
                showError(newPassword, 'Vui lòng nhập mật khẩu mới');
                valid = false;
            } else if (newPassword.value.length < 8) {
                showError(newPassword, 'Mật khẩu mới phải có ít nhất 8 ký tự');
                valid = false;
            }

            // Validate confirm password
            if (!confirmPassword.value.trim()) {
                showError(confirmPassword, 'Vui lòng nhập lại mật khẩu mới');
                valid = false;
            } else if (newPassword.value !== confirmPassword.value) {
                showError(confirmPassword, 'Mật khẩu xác nhận không khớp');
                valid = false;
            }

            if (!valid) {
                event.preventDefault();
            }
        });

        function showError(input, message) {
            const formGroup = input.closest('.mb-3') || input.closest('.mb-4');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'text-warning mt-2 ms-3';
            errorDiv.style.fontSize = '0.85rem';
            errorDiv.textContent = message;
            formGroup.appendChild(errorDiv);
            input.classList.add('is-invalid');
        }

        function clearErrors() {
            document.querySelectorAll('.text-warning').forEach(el => el.remove());
            document.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));
        }

        // Add password visibility toggle
        const toggleButtons = document.querySelectorAll('.input-group');
        toggleButtons.forEach(group => {
            if (group.querySelector('input[type="password"]')) {
                const toggleBtn = document.createElement('span');
                toggleBtn.className = 'input-group-text bg-light border-start-0 rounded-end-pill cursor-pointer';
                toggleBtn.innerHTML = '<i class="fas fa-eye-slash text-muted"></i>';
                toggleBtn.style.cursor = 'pointer';

                const passwordInput = group.querySelector('input[type="password"]');
                passwordInput.classList.remove('rounded-end-pill');

                group.appendChild(toggleBtn);

                toggleBtn.addEventListener('click', function() {
                    const input = this.previousElementSibling;
                    const icon = this.querySelector('i');

                    if (input.type === 'password') {
                        input.type = 'text';
                        icon.classList.remove('fa-eye-slash');
                        icon.classList.add('fa-eye');
                    } else {
                        input.type = 'password';
                        icon.classList.remove('fa-eye');
                        icon.classList.add('fa-eye-slash');
                    }
                });
            }
        });
    });
</script>
</body>
</html>
