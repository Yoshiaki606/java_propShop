<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Forgot Password Page">
    <meta name="author" content="">

    <title>Forgot Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-blue: #1e88e5;
            --secondary-blue: #0d47a1;
            --light-blue: #e3f2fd;
            --white: #ffffff;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-blue));
            min-height: 100vh;
        }

        .card {
            border-radius: 20px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            border: none;
        }

        .bg-reset-image {
            background-image: url('https://images.unsplash.com/photo-1567473030492-533b30c5494c?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1170&q=80');
            background-size: cover;
            background-position: center;
            min-height: 100%;
        }

        .form-control {
            padding: 0.75rem 1.2rem;
            border: 1px solid #e1e1e1;
            transition: all 0.3s;
            border-radius: 30px;
        }

        .form-control:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 0.2rem rgba(30, 136, 229, 0.25);
        }

        .btn-primary {
            background-color: var(--primary-blue);
            border: none;
            padding: 0.7rem 2rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background-color: var(--secondary-blue);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .btn-danger {
            padding: 0.7rem 2rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .card-header {
            background-color: var(--light-blue);
            padding: 1.5rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .text-primary {
            color: var(--primary-blue) !important;
        }

        .form-label {
            font-weight: 600;
            margin-left: 0.5rem;
            margin-bottom: 0.3rem;
        }

        .alert {
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .small-link {
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .small-link:hover {
            color: var(--secondary-blue) !important;
        }

        @media (max-width: 992px) {
            .bg-reset-image {
                display: none;
            }
        }

        @media (max-width: 576px) {
            .container {
                padding: 0 1rem;
            }

            .card {
                margin: 1rem;
            }

            .form-control, .btn {
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>
<div class="container py-5">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-xl-10 col-lg-12 col-md-9">
            <div class="card o-hidden border-0 shadow-lg">
                <div class="row g-0">
                    <div class="col-lg-6 d-none d-lg-block bg-reset-image"></div>
                    <div class="col-lg-6">
                        <div class="p-5">
                            <div class="text-center mb-4">
                                <h2 class="text-primary fw-bold mb-3">Forgot Your Password?</h2>
                                <p class="mb-4 text-muted">
                                    We get it, stuff happens. Just enter your email address below
                                    and we'll send you a link to reset your password!
                                </p>
                            </div>

                            <div th:if="${success}" class="alert alert-success d-flex align-items-center" role="alert">
                                <i class="fas fa-check-circle me-2"></i>
                                <div th:text="${success}"></div>
                            </div>

                            <div th:if="${error}" class="alert alert-danger d-flex align-items-center" role="alert">
                                <i class="fas fa-exclamation-circle me-2"></i>
                                <div th:text="${error}"></div>
                            </div>

                            <form th:action="@{/user/resetPassword}" class="user" method="post">
                                <div class="mb-4">
                                    <label for="exampleInputEmail" class="form-label">Email Address</label>
                                    <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0 rounded-start-pill">
                                                <i class="fas fa-envelope text-muted"></i>
                                            </span>
                                        <input type="email" name="email"
                                               class="form-control border-start-0 rounded-end-pill"
                                               id="exampleInputEmail" aria-describedby="emailHelp"
                                               placeholder="Enter your email address">
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label for="password" class="form-label">New Password</label>
                                    <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0 rounded-start-pill">
                                                <i class="fas fa-lock text-muted"></i>
                                            </span>
                                        <input type="password" name="password"
                                               class="form-control border-start-0 rounded-end-pill"
                                               id="password" aria-describedby="passwordHelp"
                                               placeholder="Enter your new password">
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                                    <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0 rounded-start-pill">
                                                <i class="fas fa-lock text-muted"></i>
                                            </span>
                                        <input type="password" name="confirmPassword"
                                               class="form-control border-start-0 rounded-end-pill"
                                               id="confirmPassword" aria-describedby="confirmHelp"
                                               placeholder="Confirm your new password">
                                    </div>
                                </div>

                                <div class="d-grid mb-4">
                                    <button type="submit" class="btn btn-primary rounded-pill">
                                        <i class="fas fa-key me-2"></i> Reset Password
                                    </button>
                                </div>
                            </form>

                            <hr class="my-4">

                            <div class="text-center">
                                <a class="small-link text-decoration-none text-primary d-block mb-2" th:href="@{/user/register}">
                                    <i class="fas fa-user-plus me-2"></i> Create an Account
                                </a>
                                <a class="small-link text-decoration-none text-primary" th:href="@{/user/login}">
                                    <i class="fas fa-sign-in-alt me-2"></i> Already have an account? Login!
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap core JavaScript -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Form validation script -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.querySelector('form');
        const password = document.getElementById('password');
        const confirmPassword = document.getElementById('confirmPassword');

        form.addEventListener('submit', function(event) {
            // Clear previous error messages
            clearErrors();

            let valid = true;

            // Validate email
            const email = document.getElementById('exampleInputEmail');
            if (!email.value.trim()) {
                showError(email, 'Email address is required');
                valid = false;
            } else if (!isValidEmail(email.value)) {
                showError(email, 'Please enter a valid email address');
                valid = false;
            }

            // Validate password
            if (!password.value.trim()) {
                showError(password, 'Password is required');
                valid = false;
            } else if (password.value.length < 8) {
                showError(password, 'Password must be at least 8 characters');
                valid = false;
            }

            // Validate confirm password
            if (!confirmPassword.value.trim()) {
                showError(confirmPassword, 'Please confirm your password');
                valid = false;
            } else if (password.value !== confirmPassword.value) {
                showError(confirmPassword, 'Passwords do not match');
                valid = false;
            }

            if (!valid) {
                event.preventDefault();
            }
        });

        function showError(input, message) {
            const formGroup = input.closest('.mb-4');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'text-danger mt-2 ms-2';
            errorDiv.style.fontSize = '0.85rem';
            errorDiv.textContent = message;
            formGroup.appendChild(errorDiv);
            input.classList.add('is-invalid');
        }

        function clearErrors() {
            document.querySelectorAll('.text-danger').forEach(el => el.remove());
            document.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));
        }

        function isValidEmail(email) {
            const re = /^(([^<>()\[\]\\.,;:\s@"]+(\.[^<>()\[\]\\.,;:\s@"]+)*)|(".+"))@((\[[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}])|(([a-zA-Z\-0-9]+\.)+[a-zA-Z]{2,}))$/;
            return re.test(String(email).toLowerCase());
        }

        // Add password visibility toggle
        const toggleButtons = document.querySelectorAll('.input-group');
        toggleButtons.forEach(group => {
            if (group.querySelector('input[type="password"]')) {
                const toggleBtn = document.createElement('span');
                toggleBtn.className = 'input-group-text bg-light border-start-0 rounded-end-pill cursor-pointer';
                toggleBtn.innerHTML = '<i class="fas fa-eye-slash text-muted"></i>';
                toggleBtn.style.cursor = 'pointer';

                const passwordInput = group.querySelector('input[type="password"]');
                passwordInput.classList.remove('rounded-end-pill');

                group.appendChild(toggleBtn);

                toggleBtn.addEventListener('click', function() {
                    const input = this.previousElementSibling;
                    const icon = this.querySelector('i');

                    if (input.type === 'password') {
                        input.type = 'text';
                        icon.classList.remove('fa-eye-slash');
                        icon.classList.add('fa-eye');
                    } else {
                        input.type = 'password';
                        icon.classList.remove('fa-eye');
                        icon.classList.add('fa-eye-slash');
                    }
                });
            }
        });
    });
</script>
</body>
</html>
